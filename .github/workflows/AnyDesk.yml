name: Cloud PC + AnyDesk + Opera GX (1080p File Extraction)

on:
  workflow_dispatch:

permissions:
  contents: read

defaults:
  run:
    shell: pwsh

jobs:
  rdp:
    runs-on: windows-latest
    timeout-minutes: 190
    env:
      ANYDESK_PASS: Pass@1234
      RUNTIME_MINUTES: 180

    steps:
      - name: Wipe Unnecessary Pre-Installed GitHub Apps & Shortcuts
        run: |
          Write-Host "Purging pre-installed desktop icons and non-essential software..."
          $publicDesktop = [Environment]::GetFolderPath("CommonDesktopDirectory")
          $userDesktop = "$env:USERPROFILE\Desktop"
          
          $targets = @("Unity Hub.lnk", "R 4.6.0.lnk", "Firefox.lnk", "Google Chrome.lnk", "Claim Rewards Here.lnk")
          foreach ($target in $targets) {
              if (Test-Path "$publicDesktop\$target") { Remove-Item "$publicDesktop\$target" -Force -ErrorAction SilentlyContinue }
              if (Test-Path "$userDesktop\$target") { Remove-Item "$userDesktop\$target" -Force -ErrorAction SilentlyContinue }
          }

      - name: Set Up Standalone AnyDesk Directory
        run: |
          Write-Host "Deploying clean filesystem framework..."
          $targetDir = "C:\Program Files (x86)\AnyDesk"
          if (-not (Test-Path $targetDir)) { New-Item -ItemType Directory -Path $targetDir -Force }
          
          Write-Host "Fetching stable AnyDesk binary..."
          $url = "https://download.anydesk.com/AnyDesk.exe"
          $targetPath = "$targetDir\AnyDesk.exe"
          
          [Net.ServicePointManager]::SecurityProtocol = [Net.SecurityProtocolType]::Tls12
          Invoke-WebRequest -Uri $url -OutFile $targetPath -UserAgent "Mozilla/5.0"

      - name: Configure Unattended Security Password & Connection Profile
        run: |
          Write-Host "Injecting security credentials..."
          $targetPath = "C:\Program Files (x86)\AnyDesk\AnyDesk.exe"
          
          echo "${{ env.ANYDESK_PASS }}" | & $targetPath --set-password
          
          New-ItemProperty -Path "HKLM:\SOFTWARE\Microsoft\Windows\CurrentVersion\Policies\System" -Name "EnableUIADesktopToggle" -PropertyType DWord -Value 1 -Force -ErrorAction SilentlyContinue
          
          $path = "HKCU:\Software\Microsoft\Windows\CurrentVersion\Explorer\Advanced"
          Set-ItemProperty -Path $path -Name "TaskbarGlomLevel" -Value 0 -ErrorAction SilentlyContinue

      - name: Optimize Canvas Resolution for No-Scroll Mobile View
        run: |
          Write-Host "Forcing screen resolution calibration to 1920x1080 frame buffer..."
          Set-DisplayResolution -Width 1920 -Height 1080 -Force -ErrorAction SilentlyContinue

      - name: Launch AnyDesk Core Service Thread
        run: |
          Write-Host "Starting AnyDesk application in backend context..."
          $targetPath = "C:\Program Files (x86)\AnyDesk\AnyDesk.exe"
          Start-Process -FilePath $targetPath -ErrorAction SilentlyContinue
          Start-Sleep -Seconds 8

      - name: Minimize Running Infrastructure Windows
        run: |
          Write-Host "Sending active command prompt windows to the taskbar tray..."
          $shell = New-Object -ComObject Shell.Application
          $shell.MinimizeAll()

      - name: Download & Force Consumer Build of Opera GX
        run: |
          Write-Host "Fetching consumer-stable Opera GX Core..."
          $url = "https://net.geo.opera.com/opera_gx/stable/windows?utm_source=inf&utm_medium=gx"
          $installer = "$env:TEMP\OperaGXSetup.exe"
          Invoke-WebRequest -Uri $url -OutFile $installer
          
          Start-Process -FilePath $installer -ArgumentList "--silent=1", "--allusers=1", "--launchbrowser=0", "--desktopshortcut=1" -Wait
          
          $publicDesktop = [Environment]::GetFolderPath("CommonDesktopDirectory")
          $userDesktop = "$env:USERPROFILE\Desktop"
          
          if (Test-Path "$userDesktop\Opera GX.lnk") {
              Move-Item -Path "$userDesktop\Opera GX.lnk" -Destination $publicDesktop -Force -ErrorAction SilentlyContinue
          }
          
          $operaExe = "$env:ProgramFiles\Opera GX\opera.exe"
          if (-not (Test-Path $operaExe)) { $operaExe = "$env:ProgramFiles (x86)\Opera GX\opera.exe" }
          
          $WshShell = New-Object -ComObject WScript.Shell
          $Shortcut = $WshShell.CreateShortcut("$publicDesktop\Opera GX Browser.lnk")
          $Shortcut.TargetPath = $operaExe
          $Shortcut.Arguments = "https://www.opera.com/gx/forsaken --no-first-run --enable-features=GXRewards,GXRewardsSidebarItem --with-feature:gx-rewards=1"
          $Shortcut.Save()

      - name: Fetch and Display AnyDesk Connection Credentials
        run: |
          Write-Host "Scanning system infrastructure configuration files for unique access keys..."
          $deviceId = "Not Found"
          
          # Target configuration path mapping for system context executions
          $configPath = "C:\ProgramData\AnyDesk\system.conf"
          
          for ($i = 1; $i -le 15; $i++) {
              if (Test-Path $configPath) {
                  $content = Get-Content $configPath -Raw
                  # Regex matches 'ad.id=' configuration lines perfectly
                  if ($content -match 'ad\.id=(\d+)') {
                      $deviceId = $Matches[1]
                      break
                  }
              }
              Start-Sleep -Seconds 2
          }
          
          $ESC = [char]27
          $Green = "$ESC[32m"
          $Yellow = "$ESC[33m"
          $Red = "$ESC[31m"
          $Reset = "$ESC[0m"
          
          Write-Host "${Green}====================================================${Reset}"
          Write-Host "${Green}      ANYDESK CLOUD PC IS READY TO CONNECT          ${Reset}"
          Write-Host "${Green}====================================================${Reset}"
          Write-Host "${Yellow} ANYDESK ID      : ${Red}${deviceId}${Reset}"
          Write-Host "${Yellow} ACCESS PASSWORD : ${Red}${{ env.ANYDESK_PASS }}${Reset}"
          Write-Host "${Green}====================================================${Reset}"

      - name: Keep alive
        run: |
          $mins = [int]"${{ env.RUNTIME_MINUTES }}"
          $end = (Get-Date).AddMinutes($mins)
          while ((Get-Date) -lt $end) {
            Write-Host ("Cloud PC Heartbeat " + (Get-Date).ToString("HH:mm:ss") + " | Active until " + $end.ToString("HH:mm:ss"))
            Start-Sleep -Seconds 60
          }
